name: "02 Weekly Evolution - Audit & Improve"
run-name: "Weekly evolution by @${{ github.actor }}"

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * 1"

permissions:
  contents: write

jobs:
  weekly:
    name: "Generate weekly audit and improvement notes"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - name: Run weekly second-brain audit
        run: node automation-workbench/scripts/second-brain-cloud-runner.mjs weekly

      - name: Commit generated audit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/*.md automation-workbench/data/*.json
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "chore: update second brain weekly audit"
            git push
          fi
