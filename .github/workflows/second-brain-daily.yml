name: Second Brain Daily Draft

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - name: Run daily second-brain draft
        env:
          ANYSEARCH_API_KEY: ${{ secrets.ANYSEARCH_API_KEY }}
          MICU_API_PROVIDER_NAME: ${{ vars.MICU_API_PROVIDER_NAME }}
          MICU_API_LOW_BALANCE_CNY: ${{ vars.MICU_API_LOW_BALANCE_CNY }}
          MICU_API_BALANCE_CNY: ${{ secrets.MICU_API_BALANCE_CNY }}
          MICU_API_BALANCE_URL: ${{ secrets.MICU_API_BALANCE_URL }}
          MICU_API_BILLING_URL: ${{ secrets.MICU_API_BILLING_URL }}
          MICU_API_BALANCE_JSON_PATH: ${{ vars.MICU_API_BALANCE_JSON_PATH }}
          MICU_API_AUTH_HEADER: ${{ vars.MICU_API_AUTH_HEADER }}
          MICU_API_AUTH_SCHEME: ${{ vars.MICU_API_AUTH_SCHEME }}
          MICU_API_KEY: ${{ secrets.MICU_API_KEY }}
          MICU_API_TOKEN: ${{ secrets.MICU_API_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_SECURE: ${{ vars.SMTP_SECURE }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_TO_FALLBACK: "jacky060911@163.com,liu13922830178@outlook.com"
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          SEND_EMAIL: ${{ vars.SEND_EMAIL }}
        run: node automation-workbench/scripts/second-brain-cloud-runner.mjs daily

      - name: Commit generated drafts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/*.md automation-workbench/data/*.json automation-workbench/obsidian-vault/**/*.md
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "chore: update second brain daily drafts"
            git push
          fi
