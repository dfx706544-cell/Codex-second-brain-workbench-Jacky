name: Second Brain Daily Draft

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run daily second-brain draft
        run: node automation-workbench/scripts/second-brain-cloud-runner.mjs daily

      - name: Commit generated drafts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/*.md automation-workbench/data/*.json
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "chore: update second brain daily drafts"
            git push
          fi
